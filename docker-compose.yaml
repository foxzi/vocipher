services:
  vocala:
    build: .
    expose:
      - "8090"
    ports:
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "40000-40200:40000-40200/udp"
      - "40201:40201/tcp"
    volumes:
      - vocala-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - vocala
    restart: unless-stopped

volumes:
  vocala-data:
