name: vocala
arch: amd64
platform: linux
version: v0.3.1
maintainer: Vocala <noreply@vocala.dev>
description: Self-hosted voice chat server with WebRTC SFU
vendor: Vocala
homepage: https://github.com/foxzi/vocala
license: MIT

contents:
  # Binary
  - src: ./vocala
    dst: /usr/bin/vocala
    file_info:
      mode: 0755

  # Web assets
  - src: ./web/templates/
    dst: /usr/share/vocala/web/templates/
  - src: ./web/static/js/
    dst: /usr/share/vocala/web/static/js/
  - src: ./web/static/img/
    dst: /usr/share/vocala/web/static/img/
  - src: ./web/static/img/avatars/
    dst: /usr/share/vocala/web/static/img/avatars/

  # Config
  - src: ./packaging/config.yaml.default
    dst: /etc/vocala/config.yaml.default
    type: config
  - src: ./config.yaml.example
    dst: /etc/vocala/config.yaml.example

  # Nginx example
  - src: ./packaging/nginx/vocala.conf
    dst: /etc/vocala/nginx.conf.example

  # Systemd
  - src: ./packaging/vocala.service
    dst: /usr/lib/systemd/system/vocala.service

  # Documentation
  - src: ./docs/architecture.md
    dst: /usr/share/doc/vocala/architecture.md
  - src: ./docs/configuration.md
    dst: /usr/share/doc/vocala/configuration.md
  - src: ./docs/deployment.md
    dst: /usr/share/doc/vocala/deployment.md
  - src: ./docs/security.md
    dst: /usr/share/doc/vocala/security.md
  - src: ./README.md
    dst: /usr/share/doc/vocala/README.md

scripts:
  postinstall: ./packaging/postinstall.sh
  preremove: ./packaging/preremove.sh

overrides:
  deb:
    depends:
      - libc6
  rpm:
    depends:
      - glibc
