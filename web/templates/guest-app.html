{{template "layout.html" .}}
{{define "content"}}
<div class="flex flex-col h-full bg-vc-bg">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 bg-vc-sidebar border-b border-vc-border">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-vc-accent/20 flex items-center justify-center">
                <svg class="w-4 h-4 text-vc-accent" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
            <div>
                <span class="font-bold text-lg">Vocala</span>
                <span class="text-xs text-vc-muted ml-1">Guest</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-sm text-vc-muted">{{.GuestName}}</span>
            <a href="/guest/leave" class="px-4 py-1.5 bg-vc-red/20 text-vc-red hover:bg-vc-red/30 text-sm font-medium rounded-lg transition">
                Leave
            </a>
        </div>
    </div>

    <!-- Main content area — app.js renders channel UI here -->
    <div class="flex-1 flex flex-col min-h-0" id="main-content">
        <div class="flex-1 flex items-center justify-center">
            <div class="text-center text-vc-muted">
                <p class="text-lg font-medium">Connecting...</p>
                <p class="text-xs mt-2" id="guest-debug"></p>
            </div>
        </div>
    </div>
</div>

<script>
    window.VOCALA_ICE_SERVERS = {{toJSON .ICEServers}};
    window.VOCALA_GUEST_CHANNEL = {{.ChannelID}};
    window.VOCALA_GUEST_NAME = {{toJSON .GuestName}};
    window.VOCALA_GUEST_TOKEN = {{toJSON .GuestToken}};
    window.VOCALA_GUEST_CHANNEL_NAME = {{toJSON .ChannelName}};
</script>
<script src="/static/js/app.js?v={{.CacheBust}}"></script>
{{end}}
