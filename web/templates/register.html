{{template "layout.html" .}}
{{define "content"}}
<div class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-sm p-8 bg-vc-sidebar rounded-2xl border border-vc-border shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-vc-accent/20 mb-4">
                <svg class="w-8 h-8 text-vc-accent" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold">Create Account</h1>
            <p class="text-vc-muted text-sm mt-1">Pick a username and get started</p>
        </div>

        {{if .Error}}
        <div class="mb-4 p-3 bg-vc-red/20 border border-vc-red/30 rounded-lg text-sm text-vc-red fade-in">
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/register" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <div>
                <label class="block text-sm font-medium text-vc-muted mb-1.5">Username</label>
                <input type="text" name="username" required autofocus minlength="2" maxlength="20"
                    class="w-full px-4 py-2.5 bg-vc-bg border border-vc-border rounded-lg text-vc-text placeholder-vc-muted focus:outline-none focus:border-vc-accent focus:ring-1 focus:ring-vc-accent transition"
                    placeholder="Choose a username">
            </div>
            <div>
                <label class="block text-sm font-medium text-vc-muted mb-1.5">Password</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full px-4 py-2.5 bg-vc-bg border border-vc-border rounded-lg text-vc-text placeholder-vc-muted focus:outline-none focus:border-vc-accent focus:ring-1 focus:ring-vc-accent transition"
                    placeholder="Choose a password">
            </div>
            <button type="submit"
                class="w-full py-2.5 bg-vc-accent hover:bg-vc-accent/80 text-white font-medium rounded-lg transition">
                Create Account
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-vc-muted text-sm">Already have an account?</p>
            <a href="/login" class="text-vc-accent hover:text-vc-accent2 text-sm font-medium transition">Log in</a>
        </div>
    </div>
</div>
{{end}}
