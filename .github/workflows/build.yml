name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: CGO_ENABLED=1 go build -ldflags "-X main.version=dev" -o vocala ./cmd/server/

      - name: Vet
        run: go vet ./...
