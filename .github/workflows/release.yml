name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          CGO_ENABLED=1 GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o vocala ./cmd/server/

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Update nfpm version
        run: |
          sed -i "s/^version:.*/version: v${{ steps.version.outputs.VERSION }}/" nfpm.yaml

      - name: Build deb package
        run: |
          mkdir -p dist
          nfpm package --packager deb --target dist/

      - name: Build rpm package
        run: |
          nfpm package --packager rpm --target dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
            vocala
